# yolov8x_p2_shallow.yaml
# Custom YOLOv8x-style model with an added shallow P2 detection head
# Based on the official YOLOv8 detection layout, but expanded from P3-P5 to P2-P5.
# P2/4 branch is intended to help with small-object detection.

nc: 80  # overridden automatically by your dataset if needed

# Fixed YOLOv8x-like channels/repeats (explicit, no compound scaling section)
# Approximate x-scale widths based on official YOLOv8 scaling:
# P1: 80, P2: 160, P3: 320, P4: 640, P5: 640

backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv, [80, 3, 2]]      # 0 - P1/2
  - [-1, 1, Conv, [160, 3, 2]]     # 1 - P2/4
  - [-1, 3, C2f, [160, True]]      # 2
  - [-1, 1, Conv, [320, 3, 2]]     # 3 - P3/8
  - [-1, 6, C2f, [320, True]]      # 4
  - [-1, 1, Conv, [640, 3, 2]]     # 5 - P4/16
  - [-1, 6, C2f, [640, True]]      # 6
  - [-1, 1, Conv, [640, 3, 2]]     # 7 - P5/32
  - [-1, 3, C2f, [640, True]]      # 8
  - [-1, 1, SPPF, [640, 5]]        # 9

head:
  # Top-down path
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]   # 10
  - [[-1, 6], 1, Concat, [1]]                    # 11 cat backbone P4
  - [-1, 3, C2f, [640]]                          # 12 P4 fusion

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]   # 13
  - [[-1, 4], 1, Concat, [1]]                    # 14 cat backbone P3
  - [-1, 3, C2f, [320]]                          # 15 P3 fusion

  # Added shallow fusion branch (P2)
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]   # 16
  - [[-1, 2], 1, Concat, [1]]                    # 17 cat backbone P2 (shallow feature map)
  - [-1, 3, C2f, [160]]                          # 18 P2/4 extra-small head

  # Bottom-up path aggregation
  - [-1, 1, Conv, [160, 3, 2]]                   # 19 downsample P2 -> P3
  - [[-1, 15], 1, Concat, [1]]                   # 20 cat head P3
  - [-1, 3, C2f, [320]]                          # 21 P3/8-small

  - [-1, 1, Conv, [320, 3, 2]]                   # 22 downsample P3 -> P4
  - [[-1, 12], 1, Concat, [1]]                   # 23 cat head P4
  - [-1, 3, C2f, [640]]                          # 24 P4/16-medium

  - [-1, 1, Conv, [640, 3, 2]]                   # 25 downsample P4 -> P5
  - [[-1, 9], 1, Concat, [1]]                    # 26 cat head P5
  - [-1, 3, C2f, [640]]                          # 27 P5/32-large

  # Detect on P2, P3, P4, P5
  - [[18, 21, 24, 27], 1, Detect, [nc]]          # 28 Detect(P2, P3, P4, P5)